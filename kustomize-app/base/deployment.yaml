apiVersion: apps/v1
kind: Deployment
metadata:
  name: kustomize-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kustomize-app
  template:
    metadata:
      labels:
        app: kustomize-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
