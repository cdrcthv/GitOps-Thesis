apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-app-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cdrcthv/gitops-thesis
    targetRevision: HEAD
    path: helm-app
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: helm-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
