apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<jouw-gebruikersnaam>/gitops-thesis
    targetRevision: HEAD
    path: helm-app
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: helm-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
