apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cdrcthv/gitops-thesis
    targetRevision: HEAD
    path: helm-app
  destination:
    server: https://kubernetes.default.svc
    namespace: helm-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
