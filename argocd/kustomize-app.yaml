apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kustomize-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cdrcthv/gitops-thesis
    targetRevision: HEAD
    path: kustomize-app/base
  destination:
    server: https://kubernetes.default.svc
    namespace: kustomize-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
