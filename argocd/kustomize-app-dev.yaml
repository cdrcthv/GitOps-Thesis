apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kustomize-app-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cdrcthv/gitops-thesis
    targetRevision: HEAD
    path: kustomize-app/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: kustomize-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
